<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .modal {
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        padding: 40px;
        background-color: var(--white-color);
        border-radius: 10px;
        max-width: 600px;
        width: 100%;
        text-align: center;
        font-size: 20px;
        font-weight: 500;
        line-height: 130%;
        letter-spacing: -1px;
        display: flex;
        flex-direction: row-reverse;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
    }
    .modal-content p {
        width: 80%;
        text-align: left;
        font-size: 18px;
        font-weight: 400;
        line-height: 130%;
        letter-spacing: -1px;
        color: var(--black-color);
    }
    .close-btn {
        text-align: right;
}
    .close-btn button {
        border: none;
        background-color: var(--black-color);
        color: var(--white-color);
        padding: 6px 15px;
        border-radius: 5px;
    }
    .close-btn button:hover {
        background-color: var(--primary-color);
        color: var(--white-color);
        transition: all 0.2s ease-in-out;
    }
    </style>
</head>
<body>
    

    <div class="modal">
        <div class="modal-content">
            <div class="close-btn">
                <button>X</button>
            </div>
            <p>안녕하세요. 이 사이트는 포트폴리오입니다.</p>
        </div>
    </div>
</body>
</html>
